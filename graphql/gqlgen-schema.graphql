# gqlgen Example Schema
#
# This SDL is taken directly from the canonical todo example in the gqlgen
# repository (_examples/todo/schema.graphql) and mirrors what the official
# getting-started tutorial generates.  gqlgen itself is a code-generation
# library; it reads SDL like this and emits a fully type-safe Go GraphQL server.
#
# Source: https://github.com/99designs/gqlgen/blob/master/_examples/todo/schema.graphql

"""
Custom directive generated by gqlgen to control Go field/resolver behaviour.
forceResolver: always generate a resolver method instead of a simple field access.
name: override the generated Go field or resolver name.
omittable: allow the field to be omitted (pointer semantics).
type: override the Go type used for the field.
"""
directive @goField(
    forceResolver: Boolean
    name: String
    omittable: Boolean
    type: String
) on INPUT_FIELD_DEFINITION | FIELD_DEFINITION

"""Prevents access to a field if the user does not have the matching role."""
directive @hasRole(role: Role!) on FIELD_DEFINITION

"""Attaches a user identity to a query, mutation, or field."""
directive @user(id: ID!) on MUTATION | QUERY | FIELD

# -------------------------------------------------------------------
# Enums
# -------------------------------------------------------------------

enum Role {
    ADMIN
    OWNER
}

# -------------------------------------------------------------------
# Scalars
# -------------------------------------------------------------------

"""Arbitrary JSON map, serialised as a JSON object."""
scalar Map

# -------------------------------------------------------------------
# Schema root — uses custom operation type names to demonstrate gqlgen
# support for non-default root type names.
# -------------------------------------------------------------------

schema {
    query: MyQuery
    mutation: MyMutation
}

# -------------------------------------------------------------------
# Query type
# -------------------------------------------------------------------

type MyQuery {
    """Look up a single todo by its ID."""
    todo(id: ID!): Todo

    """Return the most recently created todo."""
    lastTodo: Todo

    """Return all todos."""
    todos: [Todo!]!
}

# -------------------------------------------------------------------
# Mutation type
# -------------------------------------------------------------------

type MyMutation {
    """Create a new todo and return it."""
    createTodo(todo: TodoInput!): Todo!

    """Apply a partial update (map of changes) to an existing todo."""
    updateTodo(id: ID!, changes: Map!): Todo
}

# -------------------------------------------------------------------
# Object types
# -------------------------------------------------------------------

type Todo {
    id: ID!
    text: String!

    """Only the owner can see whether a todo is marked done."""
    done: Boolean! @hasRole(role: OWNER)
}

# -------------------------------------------------------------------
# Input types
# -------------------------------------------------------------------

"""Passed to createTodo to create a new todo."""
input TodoInput {
    """The body text of the todo."""
    text: String!

    """Is it done already? Defaults to false if omitted."""
    done: Boolean

    """Internal numeric identifier — type overridden via @goField."""
    number: Int! @goField(type: "github.com/99designs/gqlgen/_examples/todo.Number")
}
